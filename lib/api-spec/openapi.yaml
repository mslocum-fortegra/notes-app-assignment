openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: notes
    description: Note operations
  - name: collections
    description: Collection operations
  - name: search
    description: Search operations
  - name: activity
    description: Activity feed operations
  - name: dashboard
    description: Dashboard aggregates
  - name: users
    description: User operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # Notes
  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for the current user
      parameters:
        - name: collectionId
          in: query
          required: false
          schema:
            type: integer
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a single note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /notes/{id}/archive:
    patch:
      operationId: archiveNote
      tags: [notes]
      summary: Archive or unarchive a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}/move:
    patch:
      operationId: moveNote
      tags: [notes]
      summary: Move note to a different collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}/tags:
    put:
      operationId: updateNoteTags
      tags: [notes]
      summary: Set tags on a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteTagsBody"
      responses:
        "200":
          description: Updated tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /notes/{id}/revisions:
    get:
      operationId: getNoteRevisions
      tags: [notes]
      summary: Get revision history metadata for a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of revisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NoteRevision"

  /notes/{id}/related:
    get:
      operationId: getRelatedNotes
      tags: [notes]
      summary: Get notes related to this note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

  # Collections
  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List collections accessible to the current user
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a new collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionBody"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a collection by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionBody"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /collections/{id}/members:
    get:
      operationId: listCollectionMembers
      tags: [collections]
      summary: List members of a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionMember"
    post:
      operationId: addCollectionMember
      tags: [collections]
      summary: Add a member to a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCollectionMemberBody"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionMember"

  /collections/{id}/members/{userId}:
    delete:
      operationId: removeCollectionMember
      tags: [collections]
      summary: Remove a member from a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /collections/{id}/notes:
    get:
      operationId: listCollectionNotes
      tags: [collections]
      summary: List notes in a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notes in collection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

  # Search
  /search:
    get:
      operationId: searchNotes
      tags: [search]
      summary: Search notes
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: collectionId
          in: query
          required: false
          schema:
            type: integer
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, relevant]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # Activity
  /activity:
    get:
      operationId: getActivityFeed
      tags: [activity]
      summary: Get activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # Dashboard
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (for collaboration invites)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

  /users/me/settings:
    get:
      operationId: getUserSettings
      tags: [users]
      summary: Get current user settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    patch:
      operationId: updateUserSettings
      tags: [users]
      summary: Update current user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  # Tags
  /tags:
    get:
      operationId: listTags
      tags: [notes]
      summary: List all tags used by the current user
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagCount"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Note:
      type: object
      required: [id, title, body, collectionId, createdById, archived, createdAt, updatedAt, tags]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        collectionId:
          type: integer
        collectionName:
          type: [string, 'null']
        createdById:
          type: string
        createdByName:
          type: [string, 'null']
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    NoteDetail:
      type: object
      required: [id, title, body, collectionId, createdById, archived, createdAt, updatedAt, tags, collection, revisions, relatedNotes]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        collectionId:
          type: integer
        collectionName:
          type: [string, 'null']
        createdById:
          type: string
        createdByName:
          type: [string, 'null']
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        collection:
          $ref: "#/components/schemas/Collection"
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/NoteRevision"
        relatedNotes:
          type: array
          items:
            $ref: "#/components/schemas/Note"

    CreateNoteBody:
      type: object
      required: [title, collectionId]
      properties:
        title:
          type: string
        body:
          type: string
        collectionId:
          type: integer
        tags:
          type: array
          items:
            type: string

    UpdateNoteBody:
      type: object
      properties:
        title:
          type: string
        body:
          type: string

    ArchiveNoteBody:
      type: object
      required: [archived]
      properties:
        archived:
          type: boolean

    MoveNoteBody:
      type: object
      required: [collectionId]
      properties:
        collectionId:
          type: integer

    UpdateNoteTagsBody:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string

    NoteRevision:
      type: object
      required: [id, noteId, editedById, editSummary, createdAt]
      properties:
        id:
          type: integer
        noteId:
          type: integer
        editedById:
          type: string
        editedByName:
          type: [string, 'null']
        editSummary:
          type: string
        createdAt:
          type: string
          format: date-time

    Collection:
      type: object
      required: [id, name, description, ownerId, visibility, noteCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
        ownerName:
          type: [string, 'null']
        visibility:
          type: string
          enum: [private, shared]
        noteCount:
          type: integer
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CollectionDetail:
      type: object
      required: [id, name, description, ownerId, visibility, noteCount, createdAt, updatedAt, members, notes]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
        ownerName:
          type: [string, 'null']
        visibility:
          type: string
          enum: [private, shared]
        noteCount:
          type: integer
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/CollectionMember"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"

    CreateCollectionBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, shared]

    UpdateCollectionBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, shared]

    CollectionMember:
      type: object
      required: [userId, collectionId, role, joinedAt]
      properties:
        userId:
          type: string
        collectionId:
          type: integer
        role:
          type: string
          enum: [owner, editor, viewer]
        joinedAt:
          type: string
          format: date-time
        userName:
          type: [string, 'null']
        userEmail:
          type: [string, 'null']
        userProfileImageUrl:
          type: [string, 'null']

    AddCollectionMemberBody:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [editor, viewer]

    SearchResults:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer

    SearchResult:
      type: object
      required: [note, snippet, score]
      properties:
        note:
          $ref: "#/components/schemas/Note"
        snippet:
          type: string
        score:
          type: number

    ActivityEvent:
      type: object
      required: [id, type, actorId, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [note_created, note_edited, note_archived, note_deleted, collection_created, collection_shared, member_added, member_removed]
        actorId:
          type: string
        actorName:
          type: [string, 'null']
        actorProfileImageUrl:
          type: [string, 'null']
        entityId:
          type: [integer, 'null']
        entityType:
          type: [string, 'null']
        entityTitle:
          type: [string, 'null']
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    DashboardData:
      type: object
      required: [recentNotes, recentCollections, recentActivity]
      properties:
        recentNotes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        recentCollections:
          type: array
          items:
            $ref: "#/components/schemas/Collection"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"

    DashboardStats:
      type: object
      required: [totalNotes, totalCollections, sharedCollections, archivedNotes, recentNotesCount]
      properties:
        totalNotes:
          type: integer
        totalCollections:
          type: integer
        sharedCollections:
          type: integer
        archivedNotes:
          type: integer
        recentNotesCount:
          type: integer

    UserSummary:
      type: object
      required: [id, firstName, lastName]
      properties:
        id:
          type: string
        firstName:
          type: [string, 'null']
        lastName:
